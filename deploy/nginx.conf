upstream django {
    server 127.0.0.1:8000;
}

# ── Общий блок location (используется в двух server блоках) ──────────────────
# Порт 80 — для локального Nginx (прямой доступ по IP)
# Порт 3000 — для внешнего reverse proxy (akfa.salesvision.uz → 10.7.4.161:3000)

server {
    listen 80;
    server_name _;

    client_max_body_size 500M;

    # ── Media (загруженные файлы) ─────────────────────────────────────────────
    location /media/ {
        alias /var/www/sales-media/;
        expires 7d;
    }

    # ── Static (Django collectstatic) ─────────────────────────────────────────
    location /static/ {
        alias /var/www/sales-analytics/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend API (напрямую, минуя Next.js) ─────────────────────────────────
    location /api/ {
        rewrite ^(/api/.+[^/])$ $1/ break;
        proxy_pass         http://django;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ── Django Admin ──────────────────────────────────────────────────────────
    location /django-admin/ {
        proxy_pass         http://django;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ── Next.js Public folder (standalone не раздаёт public/, раздаём через nginx) ──
    location /uz-regions.json {
        root /var/www/sales-analytics/frontend/public;
        expires 1d;
        add_header Cache-Control "public";
        add_header Content-Type "application/json";
    }

    # ── Frontend (Next.js standalone на порту 3001) ───────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}

# ── Порт 3000 — для внешнего reverse proxy ────────────────────────────────────
# Внешний прокси (195.158.4.138) отправляет всё на 10.7.4.161:3000
# Здесь правильно маршрутизируем /api/, /media/, / без буферизации Next.js
server {
    listen 3000;
    server_name _;

    client_max_body_size 500M;

    # ── Media (загруженные файлы) ─────────────────────────────────────────────
    location /media/ {
        alias /var/www/sales-media/;
        expires 7d;
    }

    # ── Static (Django collectstatic) ─────────────────────────────────────────
    location /static/ {
        alias /var/www/sales-analytics/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Backend API (напрямую на Django, минуя Next.js) ───────────────────────
    location /api/ {
        rewrite ^(/api/.+[^/])$ $1/ break;
        proxy_pass         http://django;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ── Django Admin ──────────────────────────────────────────────────────────
    location /django-admin/ {
        proxy_pass         http://django;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ── Next.js Public folder (standalone не раздаёт public/, раздаём через nginx) ──
    location /uz-regions.json {
        root /var/www/sales-analytics/frontend/public;
        expires 1d;
        add_header Cache-Control "public";
        add_header Content-Type "application/json";
    }

    # ── Frontend (Next.js standalone на порту 3001) ───────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
