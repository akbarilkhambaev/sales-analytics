name: CD — Deploy to Production

on:
  push:
    branches: [main]   # деплой только при пуше в main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd /var/www/sales-analytics

            echo "▸ Получаем обновления из Git..."
            git pull origin main

            echo "▸ Backend: миграции + collectstatic"
            source backend/venv/bin/activate
            pip install -r backend/requirements.txt -q
            cd backend
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            cd ..
            deactivate

            echo "▸ Frontend: сборка"
            cd frontend
            npm ci --silent
            npm run build
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public 2>/dev/null || true
            cd ..

            echo "▸ Перезапуск сервисов"
            sudo systemctl restart sales-gunicorn sales-nextjs

            echo "✅ Деплой завершён!"
